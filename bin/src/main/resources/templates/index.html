
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Transaction Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet">
</head>
<body class="container mt-4">

<h3 class="text-center">Account Balances</h3>

<table class="table table-bordered">
    <tr>
        <th>Account</th>
        <th>Balance</th>
    </tr>
    <tr th:each="acc : ${accounts}">
        <td th:text="${acc.name}"></td>
        <td th:text="${acc.balance}"></td>
    </tr>
</table>

<hr>

<h4>Add Incoming Transaction</h4>

<form action="/receive" method="post">
    <div class="mb-2">
        <select name="account" class="form-control">
            <option>Econet</option>
            <option>InnBucks</option>
            <option>Mukuru</option>
        </select>
    </div>

    <div class="mb-2">
        <input type="number" step="0.01" name="amount"
               class="form-control" placeholder="Amount" required>
    </div>

    <button class="btn btn-success w-100">Receive Money</button>
</form>

</body>
</html>
