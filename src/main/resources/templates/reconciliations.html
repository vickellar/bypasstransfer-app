<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reconciliations</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h3>Reconciliations</h3>

<div class="mb-3">
    <a class="btn btn-secondary" th:href="@{/}">Back to Dashboard</a>
    <a class="btn btn-outline-primary" th:href="@{/reconciliations/export/csv}">Export CSV</a>
    <a class="btn btn-outline-primary" th:href="@{/reconciliations/export/pdf}">Export PDF</a>
</div>

<div id="msg" style="display:none;" class="alert" role="alert"></div>

<table class="table table-sm table-bordered">
    <thead>
        <tr>
            <th>Date</th>
            <th>System Balance</th>
            <th>Actual Balance</th>
            <th>Difference</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="rows">
    <tr th:each="rec : ${reconciliations}">
        <td th:text="${rec.date}"></td>
        <td th:text="${rec.systemBalance}"></td>
        <td th:text="${rec.actualBalance}"></td>
        <td th:text="${rec.difference}"></td>
        <td>
            <button class="btn btn-danger btn-sm" th:attr="data-id=${rec.id}" onclick="deleteRec(this)">Delete</button>
        </td>
    </tr>
    </tbody>
</table>

<nav aria-label="Page navigation">
  <ul class="pagination">
    <li class="page-item" th:classappend="${reconciliationsPage.first}? 'disabled'">
      <a class="page-link" th:href="@{/reconciliations(page=${currentPage - 1}, size=${reconciliationsPage.size})}">Previous</a>
    </li>
    <li class="page-item disabled"><a class="page-link">Page <span th:text="${reconciliationsPage.number + 1}"></span> of <span th:text="${reconciliationsPage.totalPages}"></span></a></li>
    <li class="page-item" th:classappend="${reconciliationsPage.last}? 'disabled'">
      <a class="page-link" th:href="@{/reconciliations(page=${currentPage + 1}, size=${reconciliationsPage.size})}">Next</a>
    </li>
  </ul>
</nav>

<script>
function deleteRec(btn) {
    const id = btn.getAttribute('data-id');
    if (!confirm('Delete reconciliation #' + id + '?')) return;
    fetch('/reconciliations/' + id, { method: 'DELETE' })
        .then(r => {
            if (!r.ok) throw new Error('Delete failed');
            // remove row
            const tr = btn.closest('tr');
            tr.parentNode.removeChild(tr);
            const msg = document.getElementById('msg');
            msg.className = 'alert alert-success';
            msg.textContent = 'Reconciliation deleted.';
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 4000);
        })
        .catch(e => {
            const msg = document.getElementById('msg');
            msg.className = 'alert alert-danger';
            msg.textContent = 'Delete failed: ' + e.message;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 4000);
        });
}
</script>

</body>
</html>
