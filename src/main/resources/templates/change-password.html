<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - ByPass Transfers</title>
    <link rel="stylesheet" th:href="@{/css/site.css}" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
        
        .page-header { text-align: center; margin-bottom: 48px; }
        .page-header h1 { font-size: 32px; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
        .page-header p { color: #64748b; }
        
        .form-container { max-width: 480px; margin: 0 auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        .alert { padding: 16px; border-radius: 8px; margin-bottom: 24px; }
        .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .alert-danger { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 500; color: #374151; margin-bottom: 8px; font-size: 14px; }
        .form-group input {
            width: 100%; padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 8px;
            font-size: 15px; transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        
        .btn-primary { 
            background: #3b82f6; color: white; padding: 14px 32px; border: none; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; width: 100%;
        }
        .btn-primary:hover { background: #2563eb; }
        
        .btn-secondary {
            background: #f3f4f6; color: #374151; padding: 12px 24px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; text-decoration: none;
            display: inline-block; text-align: center; margin-top: 16px;
        }
        .btn-secondary:hover { background: #e5e7eb; }
        
        .password-requirements { background: #f8fafc; padding: 16px; border-radius: 8px; margin-bottom: 24px; }
        .password-requirements h3 { font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 8px; }
        .password-requirements ul { list-style: none; padding-left: 0; }
        .password-requirements li { font-size: 13px; color: #64748b; margin-bottom: 4px; padding-left: 20px; position: relative; }
        .password-requirements li::before { content: "•"; position: absolute; left: 8px; color: #3b82f6; }
    </style>
</head>
<body style="background: #f8fafc;">
    <div th:insert="~{fragments/header :: header}"></div>

    <div class="container">
        <div class="page-header">
            <h1>Change Password</h1>
            <p>Update your account password</p>
        </div>

        <div class="form-container">
            <div th:if="${success}" class="alert alert-success">
                <i class="fas fa-check-circle" style="margin-right: 8px;"></i>
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger">
                <i class="fas fa-exclamation-circle" style="margin-right: 8px;"></i>
                <span th:text="${error}"></span>
            </div>

            <div class="password-requirements">
                <h3>Password Requirements:</h3>
                <ul>
                    <li>At least 6 characters long</li>
                    <li>Cannot be the same as your current password</li>
                </ul>
            </div>

            <form th:action="@{/change-password}" method="post">
                <div class="form-group">
                    <label for="currentPassword">Current Password *</label>
                    <input type="password" id="currentPassword" name="currentPassword" required placeholder="Enter your current password">
                </div>

                <div class="form-group">
                    <label for="newPassword">New Password *</label>
                    <input type="password" id="newPassword" name="newPassword" required minlength="6" placeholder="Enter new password (min 6 characters)">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password *</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6" placeholder="Confirm your new password">
                </div>

                <button type="submit" class="btn-primary">
                    <i class="fas fa-key" style="margin-right: 8px;"></i>Change Password
                </button>
            </form>

            <a th:href="@{/app}" class="btn-secondary" style="width: 100%;">
                <i class="fas fa-arrow-left" style="margin-right: 8px;"></i>Back to Dashboard
            </a>
        </div>
    </div>

    <div th:insert="~{fragments/footer :: footer}"></div>
</body>
</html>
