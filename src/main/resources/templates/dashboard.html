<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="utf-8">
        <title>Transaction System</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="container mt-3">

        <div class="d-flex justify-content-end mb-3">
            <form action="/logout" method="post">
                <button class="btn btn-outline-secondary btn-sm">Logout</button>
            </form>
        </div>

        <h3 class="text-center">Account Balances</h3>

        <table class="table table-bordered">
            <tr>
                <th>Account</th>
                <th>Balance</th>
            </tr>
            <tr th:each="acc : ${accounts}">
                <td th:text="${acc.accountType}"></td>
                <td th:text="${acc.balance}"></td>
            </tr>
        </table>

        <hr>

        <h4>Receive Money</h4>
        <form action="/receive" method="post">
            <select name="account" class="form-control mb-2">
                <option>Econet</option>
                <option>InnBucks</option>
                <option>Mukuru</option>
            </select>
            <input type="number" step="0.01" name="amount" class="form-control mb-2" required>
            <button class="btn btn-success w-100">Receive</button>
        </form>

        <hr>

        <h4>Send Money</h4>
        <form action="/send" method="post">
            <select name="account" class="form-control mb-2">
                <option>Econet</option>
                <option>InnBucks</option>
                <option>Mukuru</option>
            </select>
            <input type="number" step="0.01" name="amount" class="form-control mb-2" required>
            <button class="btn btn-danger w-100">Send</button>
        </form>

        <hr>

        <h4>Transfer Money</h4>
        <form action="/transfer" method="post">
            <select name="from" class="form-control mb-2">
                <option>Econet</option>
                <option>InnBucks</option>
                <option>Mukuru</option>
            </select>

            <select name="to" class="form-control mb-2">
                <option>Econet</option>
                <option>InnBucks</option>
                <option>Mukuru</option>
            </select>

            <input type="number" step="0.01" name="amount" class="form-control mb-2" required>
            <button class="btn btn-warning w-100">Transfer</button>
        </form>
        
        <div>
<h3>Wallet Balances</h3>
<div th:each="wallet : ${wallets}">
<span th:text="${wallet.currency}"></span> :
<span th:text="${wallet.balance}"></span>
</div>
</div>

        <hr>
        

        <h4>Transaction History</h4>
        <table class="table table-sm table-striped">
            <tr>
                <th>Date</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Fee</th>
                <th>From</th>
                <th>To</th>
            </tr>
            <tr th:each="tx : ${transactions}">
                <td th:text="${tx.date}"></td>
                <td th:text="${tx.type}"></td>
                <td th:text="${tx.amount}"></td>
                <td th:text="${tx.fee}"></td>
                <td th:text="${tx.fromAccount}"></td>
                <td th:text="${tx.toAccount}"></td>
            </tr>
        </table>

        <hr>

        <h4 class="text-center text-success">
            Total Profit (Fees): <span th:text="${totalFees}"></span>
        </h4>

    </body>
</html>
