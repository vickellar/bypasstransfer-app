<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Account | ByPass Transfers</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" th:href="@{/favicon.png}" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
    <div class="ambient-bg"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div th:insert="~{fragments/header :: header}"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <img th:src="@{/images/app-logo.png}" alt="Logo" class="auth-logo" />
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Join ByPass for secure global transfers</p>
            </div>

            <div th:if="${error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
            </div>
            <div th:if="${success}" class="alert alert-success">
                <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
            </div>

            <form th:action="@{/register}" method="post" class="auth-form">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Username" class="auth-input" required />
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="Email" class="auth-input" required />
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="text" name="phoneNumber" placeholder="Phone" class="auth-input" />
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Password" class="auth-input" required />
                </div>
                
                <div style="margin-top: 8px;">
                    <button type="submit" class="auth-btn">
                        Get Started <i class="fas fa-rocket"></i>
                    </button>
                    <a th:href="@{/}" class="auth-link" style="display:block; text-align:center; margin-top:12px;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
