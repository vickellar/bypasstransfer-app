<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ByPass Transfers</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}" />
    <link rel="stylesheet" th:href="@{/css/site.css}" />
    <style>
        .register-wrapper {
            min-height: calc(100vh - 220px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 16px;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        .register-card {
            max-width: 540px;
        }

        .register-header {
            text-align: center;
            margin-bottom: 16px;
        }

        .register-logo {
            width: 86px;
            height: 86px;
            object-fit: contain;
            border-radius: 18px;
            background: #fff;
            display: block;
            margin: 0 auto 10px auto;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
        }

        .register-title {
            font-size: 26px;
            font-weight: 800;
            margin: 6px 0 6px 0;
            color: #0f172a;
        }

        .register-subtitle {
            margin: 0;
            color: #64748b;
            font-size: 14px;
        }

        .register-form {
            margin-top: 12px;
        }

        .register-foot {
            margin-top: 14px;
            text-align: center;
            color: #475569;
            font-size: 14px;
        }

        .register-foot a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .register-foot a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div th:insert="fragments/header :: header"></div>

    <main class="register-wrapper">
        <section class="register-card container">
            <div class="register-header">
                <img th:src="@{/images/app-logo.png}" alt="ByPass Transfers Logo" class="register-logo" />
                <h1 class="register-title">Create your account</h1>
                <p class="register-subtitle">Register to start sending money safely.</p>
            </div>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <form th:action="@{/register}" method="post" class="form register-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required class="form-control" />
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required class="form-control" />
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" name="phoneNumber" class="form-control" />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required class="form-control" />
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Register</button>
                    <a th:href="@{/app}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>

            <p class="register-foot">
                Already have an account? <a th:href="@{/login}">Login</a>
            </p>
        </section>
    </main>

    <div th:insert="fragments/footer :: footer"></div>

    
</body>
</html>
