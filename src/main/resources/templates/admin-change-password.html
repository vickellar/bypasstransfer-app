<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - ByPass Transfers</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        .container { max-width: 500px; margin: 40px auto; padding: 20px; }
        .page-header { margin-bottom: 30px; text-align: center; }
        .page-header h1 { 
            font-size: 28px; 
            font-weight: 700; 
            color: #1e293b; 
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .page-header p { color: #64748b; font-size: 16px; }
        
        .form-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }
        
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #334155;
            font-size: 14px;
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 251, 0.1);
        }
        .form-control.error {
            border-color: #ef4444;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            font-size: 16px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-align: center;
            justify-content: center;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
            width: 100%;
            margin-top: 10px;
        }
        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            padding: 10px 20px;
        }
        .btn-secondary:hover {
            background: #e2e8f0;
        }
        
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .password-requirements {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
        }
        .password-requirements h4 {
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 10px;
        }
        .password-requirements ul {
            margin: 0;
            padding-left: 20px;
            font-size: 13px;
            color: #64748b;
        }
        .password-requirements li {
            margin-bottom: 4px;
        }
        
        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            border-left: 4px solid;
        }
        .alert-success {
            background: #f0fdf4;
            color: #166534;
            border-color: #bbf7d0;
        }
        .alert-error {
            background: #fef2f2;
            color: #991b1b;
            border-color: #fecaca;
        }
        
        @media (max-width: 768px) {
            .container {
                margin: 20px auto;
                padding: 16px;
            }
            .form-card {
                padding: 24px;
            }
            .page-header h1 {
                font-size: 24px;
            }
            .actions {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div th:insert="~{fragments/header :: header}"></div>
    
    <div class="container">
        <div class="page-header">
            <h1>
                <i class="fas fa-key"></i>
                Change Password
            </h1>
            <p>Update your administrator account password</p>
        </div>
        
        <div th:if="${success}" class="alert alert-success">
            <i class="fas fa-check-circle"></i>
            <span th:text="${success}"></span>
        </div>
        
        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}"></span>
        </div>
        
        <div class="form-card">
            <form th:action="@{/admin/change-password}" method="post" id="passwordForm">
                <div class="form-group">
                    <label class="form-label" for="currentPassword">
                        <i class="fas fa-lock"></i> Current Password
                    </label>
                    <input type="password" id="currentPassword" name="currentPassword" 
                           class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="newPassword">
                        <i class="fas fa-key"></i> New Password
                    </label>
                    <input type="password" id="newPassword" name="newPassword" 
                           class="form-control" required minlength="8">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">
                        <i class="fas fa-key"></i> Confirm New Password
                    </label>
                    <input type="password" id="confirmPassword" name="confirmPassword" 
                           class="form-control" required minlength="8">
                </div>
                
                <div class="password-requirements">
                    <h4><i class="fas fa-info-circle"></i> Password Requirements</h4>
                    <ul>
                        <li>Must be at least 8 characters long</li>
                        <li>Should contain uppercase and lowercase letters</li>
                        <li>Should include numbers and special characters</li>
                        <li>New password must match confirmation</li>
                    </ul>
                </div>
                
                <div class="actions">
                    <a th:href="@{/admin}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Cancel
                    </a>
                    <button type="submit" class="btn btn-primary" onclick="return validatePasswords()">
                        <i class="fas fa-save"></i> Change Password
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <div th:insert="~{fragments/footer :: footer}"></div>
    
    <script>
        function validatePasswords() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const form = document.getElementById('passwordForm');
            
            // Reset error states
            document.getElementById('newPassword').classList.remove('error');
            document.getElementById('confirmPassword').classList.remove('error');
            
            // Check if passwords match
            if (newPassword !== confirmPassword) {
                alert('New passwords do not match!');
                document.getElementById('newPassword').classList.add('error');
                document.getElementById('confirmPassword').classList.add('error');
                return false;
            }
            
            // Check password length
            if (newPassword.length < 8) {
                alert('Password must be at least 8 characters long!');
                document.getElementById('newPassword').classList.add('error');
                return false;
            }
            
            return true;
        }
        
        // Real-time password matching
        document.getElementById('confirmPassword').addEventListener('input', function() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = this.value;
            
            if (newPassword && confirmPassword) {
                if (newPassword === confirmPassword) {
                    this.style.borderColor = '#22c55e';
                } else {
                    this.style.borderColor = '#ef4444';
                }
            } else {
                this.style.borderColor = '#e2e8f0';
            }
        });
    </script>
</body>
</html>
