<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
      <head>
      <title>login</title>
      <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/site.css}" />
    <style>
        /* keep a small scoped style for the login card */
        .login-wrapper { display:flex; justify-content:center; padding:40px 16px; }
        .login-container {
            background: white;
            padding: 2em;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 320px;
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div th:insert="fragments/header :: header"></div>

    <div class="login-wrapper">
    <div class="login-container">
        <h2>Login to ByPass</h2>
        <!-- Show authentication error or logout confirmation when Spring Security sets the URL params -->
        <div th:if="${param.error}" style="color:#b00020; margin-bottom:1em; text-align:center;">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" style="color:green; margin-bottom:1em; text-align:center;">
            You have been logged out successfully.
        </div>
        <div th:if="${param.reset} == 'success'" style="color:green; margin-bottom:1em; text-align:center;">
            Password reset successful. Please login with your new password.
        </div>
        <div th:if="${param.reset} == 'error'" style="color:#b00020; margin-bottom:1em; text-align:center;">
            Password reset failed or token expired.
        </div>
        <!-- Show flash messages set via RedirectAttributes (e.g. password reset errors/success) -->
        <div th:if="${error}" style="color:#b00020; margin-bottom:1em; text-align:center;" th:text="${error}"></div>
        <div th:if="${success}" style="color:green; margin-bottom:1em; text-align:center;" th:text="${success}"></div>
        <form th:action="@{/login}" method="post">
            <input type="text" name="username" placeholder="Username or email" autocomplete="username" required />
            <input type="password" name="password" placeholder="Password" required />
            <button type="submit">Login</button>
        </form>
        <p><a th:href="@{/forgot-password}">Forgot password?</a></p>
    </div>
    </div>

    <div th:insert="fragments/footer :: footer"></div>
</body>
</html>
