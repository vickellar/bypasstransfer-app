<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login | ByPass Transfers</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" th:href="@{/favicon.png}" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>

<body>
    <div class="ambient-bg"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div th:insert="~{fragments/header :: header}"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <img th:src="@{/images/app-logo.png}" alt="Logo" class="auth-logo" />
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Secure access to your transfers</p>
            </div>

            <!-- Messages -->
            <div th:if="${param.error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i> Invalid credentials.
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                <i class="fas fa-check-circle"></i> Logged out successfully.
            </div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form th:action="@{/login}" method="post" class="auth-form">
                <div class="input-group">
                    <label>Username or Email</label>
                    <input type="text" name="username" placeholder="Enter your username" class="auth-input"
                        autocomplete="username" required />
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" class="auth-input" required />
                </div>

                <button type="submit" class="auth-btn">
                    Sign In <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="auth-footer">
                <a th:href="@{/forgot-password}" class="auth-link">Forgot password?</a>
            </div>
        </div>
    </div>
</body>

</html>
