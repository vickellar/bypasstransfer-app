<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Branch Management - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header h1 i {
            color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-warning {
            background: #ffc107;
            color: #333;
        }

        .branches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .branch-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            transition: all 0.3s;
            position: relative;
        }

        .branch-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        .branch-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .branch-name {
            font-size: 22px;
            color: #333;
            font-weight: 700;
        }

        .branch-country {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .branch-country i {
            color: #667eea;
        }

        .branch-currency {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 15px;
        }

        .branch-details {
            margin-bottom: 20px;
        }

        .detail-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
            color: #555;
            font-size: 14px;
        }

        .detail-row i {
            color: #667eea;
            margin-top: 3px;
        }

        .branch-status {
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-active {
            background: #d4edda;
            color: #155724;
        }

        .status-inactive {
            background: #f8d7da;
            color: #721c24;
        }

        .branch-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 40px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            position: relative;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #000;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .stats-bar {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <i class="fas fa-building"></i>
                Branch Management
            </h1>
            <button class="btn btn-primary" onclick="openAddModal()">
                <i class="fas fa-plus"></i>
                Add New Branch
            </button>
        </div>

        <!-- Statistics Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalBranches">0</div>
                <div class="stat-label">Total Branches</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="activeBranches">0</div>
                <div class="stat-label">Active Branches</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalCurrencies">0</div>
                <div class="stat-label">Currencies</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="lastUpdate">-</div>
                <div class="stat-label">Last Sync</div>
            </div>
        </div>

        <!-- Branches Grid -->
        <div class="branches-grid" id="branchesGrid">
            <!-- Branch cards will be loaded here dynamically -->
        </div>
    </div>

    <!-- Add/Edit Branch Modal -->
    <div id="branchModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="margin-bottom: 30px; color: #333;">
                <i class="fas fa-plus-circle" style="color: #667eea;"></i>
                Add New Branch
            </h2>
            <form id="branchForm">
                <input type="hidden" id="branchId">
                
                <div class="form-group">
                    <label for="branchName">Branch Name *</label>
                    <input type="text" id="branchName" required placeholder="e.g., South Africa Branch">
                </div>

                <div class="form-group">
                    <label for="country">Country *</label>
                    <input type="text" id="country" required placeholder="e.g., South Africa">
                </div>

                <div class="form-group">
                    <label for="currency">Base Currency *</label>
                    <select id="currency" required>
                        <option value="">Select Currency</option>
                        <option value="USD">USD - US Dollar</option>
                        <option value="ZAR">ZAR - South African Rand</option>
                        <option value="RUB">RUB - Russian Ruble</option>
                        <option value="EUR">EUR - Euro</option>
                        <option value="GBP">GBP - British Pound</option>
                        <option value="ZWL">ZWL - Zimbabwean Dollar</option>
                        <option value="NGN">NGN - Nigerian Naira</option>
                        <option value="KES">KES - Kenyan Shilling</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="address">Branch Address</label>
                    <textarea id="address" rows="3" placeholder="Full physical address"></textarea>
                </div>

                <div class="form-group">
                    <label for="contactEmail">Contact Email</label>
                    <input type="email" id="contactEmail" placeholder="branch@email.com">
                </div>

                <div class="form-group">
                    <label for="contactPhone">Contact Phone</label>
                    <input type="text" id="contactPhone" placeholder="+1234567890">
                </div>

                <div style="display: flex; gap: 10px; margin-top: 30px;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">
                        <i class="fas fa-save"></i> Save Branch
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()" style="flex: 1;">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '/admin/branches';
        const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

        // Load branches on page load
        document.addEventListener('DOMContentLoaded', loadBranches);

        async function loadBranches() {
            try {
                const response = await fetch(API_BASE + '/all');
                const branches = await response.json();
                
                renderBranches(branches);
                updateStats(branches);
            } catch (error) {
                console.error('Error loading branches:', error);
                alert('Failed to load branches');
            }
        }

        function renderBranches(branches) {
            const grid = document.getElementById('branchesGrid');
            grid.innerHTML = '';

            branches.forEach(branch => {
                const card = document.createElement('div');
                card.className = 'branch-card';
                card.innerHTML = `
                    <div class="branch-header">
                        <div class="branch-name">${escapeHtml(branch.name)}</div>
                        <span class="branch-status ${branch.active ? 'status-active' : 'status-inactive'}">
                            ${branch.active ? 'Active' : 'Inactive'}
                        </span>
                    </div>
                    <div class="branch-country">
                        <i class="fas fa-map-marker-alt"></i>
                        ${escapeHtml(branch.country)}
                    </div>
                    <div class="branch-currency">${branch.currency}</div>
                    <div class="branch-details">
                        ${branch.address ? `
                        <div class="detail-row">
                            <i class="fas fa-map"></i>
                            <span>${escapeHtml(branch.address)}</span>
                        </div>
                        ` : ''}
                        ${branch.contactEmail ? `
                        <div class="detail-row">
                            <i class="fas fa-envelope"></i>
                            <span>${escapeHtml(branch.contactEmail)}</span>
                        </div>
                        ` : ''}
                        ${branch.contactPhone ? `
                        <div class="detail-row">
                            <i class="fas fa-phone"></i>
                            <span>${escapeHtml(branch.contactPhone)}</span>
                        </div>
                        ` : ''}
                    </div>
                    <div class="branch-actions">
                        <button class="btn btn-warning" onclick="editBranch(${branch.id})">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        ${branch.active ? `
                        <button class="btn btn-danger" onclick="deactivateBranch(${branch.id})">
                            <i class="fas fa-times"></i> Deactivate
                        </button>
                        ` : `
                        <button class="btn btn-success" onclick="activateBranch(${branch.id})">
                            <i class="fas fa-check"></i> Activate
                        </button>
                        `}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateStats(branches) {
            const total = branches.length;
            const active = branches.filter(b => b.active).length;
            const currencies = new Set(branches.map(b => b.currency)).size;

            document.getElementById('totalBranches').textContent = total;
            document.getElementById('activeBranches').textContent = active;
            document.getElementById('totalCurrencies').textContent = currencies;
            
            // Last update - would need separate API call
            document.getElementById('lastUpdate').textContent = 'Today';
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus-circle" style="color: #667eea;"></i> Add New Branch';
            document.getElementById('branchForm').reset();
            document.getElementById('branchId').value = '';
            document.getElementById('branchModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('branchModal').style.display = 'none';
        }

        async function editBranch(id) {
            try {
                const response = await fetch(`${API_BASE}/${id}`);
                const branch = await response.json();

                document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit" style="color: #667eea;"></i> Edit Branch';
                document.getElementById('branchId').value = branch.id;
                document.getElementById('branchName').value = branch.name;
                document.getElementById('country').value = branch.country;
                document.getElementById('currency').value = branch.currency;
                document.getElementById('address').value = branch.address || '';
                document.getElementById('contactEmail').value = branch.contactEmail || '';
                document.getElementById('contactPhone').value = branch.contactPhone || '';

                document.getElementById('branchModal').style.display = 'block';
            } catch (error) {
                console.error('Error loading branch:', error);
                alert('Failed to load branch details');
            }
        }

        // Form submission
        document.getElementById('branchForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('branchId').value;
            const branchData = {
                name: document.getElementById('branchName').value,
                country: document.getElementById('country').value,
                currency: document.getElementById('currency').value,
                address: document.getElementById('address').value,
                contactEmail: document.getElementById('contactEmail').value,
                contactPhone: document.getElementById('contactPhone').value
            };

            try {
                const url = id ? `${API_BASE}/${id}` : API_BASE;
                const method = id ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        [csrfHeader]: csrfToken
                    },
                    body: JSON.stringify(branchData)
                });

                if (response.ok) {
                    closeModal();
                    loadBranches();
                    alert('Branch saved successfully!');
                } else {
                    const error = await response.text();
                    throw new Error(error);
                }
            } catch (error) {
                console.error('Error saving branch:', error);
                alert('Failed to save branch: ' + error.message);
            }
        });

        async function deactivateBranch(id) {
            if (!confirm('Are you sure you want to deactivate this branch?')) return;

            try {
                const response = await fetch(`${API_BASE}/${id}`, {
                    method: 'DELETE',
                    headers: {
                        [csrfHeader]: csrfToken
                    }
                });

                if (response.ok) {
                    loadBranches();
                    alert('Branch deactivated successfully!');
                } else {
                    throw new Error('Failed to deactivate branch');
                }
            } catch (error) {
                console.error('Error deactivating branch:', error);
                alert('Failed to deactivate branch');
            }
        }

        async function activateBranch(id) {
            try {
                const response = await fetch(`${API_BASE}/${id}/activate`, {
                    method: 'POST',
                    headers: {
                        [csrfHeader]: csrfToken
                    }
                });

                if (response.ok) {
                    loadBranches();
                    alert('Branch activated successfully!');
                } else {
                    throw new Error('Failed to activate branch');
                }
            } catch (error) {
                console.error('Error activating branch:', error);
                alert('Failed to activate branch');
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('branchModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
