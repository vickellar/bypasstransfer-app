<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header h1 i {
            color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-warning {
            background: #ffc107;
            color: #333;
        }

        .btn-info {
            background: #17a2b8;
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .stats-bar {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        .filters {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .users-table {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th,
        td {
            padding: 15px;
            text-align: left;
        }

        tbody tr {
            border-bottom: 1px solid #e0e0e0;
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background-color: #f5f5f5;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .badge-super-admin {
            background: #764ba2;
            color: white;
        }

        .badge-admin {
            background: #667eea;
            color: white;
        }

        .badge-supervisor {
            background: #fd7e14;
            color: white;
        }

        .badge-staff {
            background: #17a2b8;
            color: white;
        }

        .badge-user {
            background: #6c757d;
            color: white;
        }

        .badge-active {
            background: #d4edda;
            color: #155724;
        }

        .badge-inactive {
            background: #f8d7da;
            color: #721c24;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .actions button,
        .actions a {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 40px;
            border-radius: 15px;
            max-width: 700px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #000;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .branch-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .currency-badge {
            background: #28a745;
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 15px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.4s;
            max-width: 360px;
            pointer-events: none;
        }

        .toast.success {
            background: #28a745;
        }

        .toast.error {
            background: #dc3545;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <i class="fas fa-users-cog"></i>
                User &amp; Branch Assignment
            </h1>
            <div style="display:flex;gap:10px;">
                <a href="/admin" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Back to Admin
                </a>
                <button class="btn btn-primary" onclick="openAddUserModal()">
                    <i class="fas fa-user-plus"></i> Add New User
                </button>
            </div>
        </div>

        <!-- Statistics Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalUsers">0</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalBranches">0</div>
                <div class="stat-label">Branches</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="activeUsers">0</div>
                <div class="stat-label">Active Users</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="staffCount">0</div>
                <div class="stat-label">Staff Members</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-group">
                <label for="branchFilter">Filter by Branch:</label>
                <select id="branchFilter" onchange="applyFilters()">
                    <option value="">All Branches</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="roleFilter">Filter by Role:</label>
                <select id="roleFilter" onchange="applyFilters()">
                    <option value="">All Roles</option>
                    <option value="SUPER_ADMIN">Super Admin</option>
                    <option value="ADMIN">Admin</option>
                    <option value="SUPERVISOR">Supervisor</option>
                    <option value="STAFF">Staff</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="statusFilter">Filter by Status:</label>
                <select id="statusFilter" onchange="applyFilters()">
                    <option value="">All Statuses</option>
                    <option value="true">Active</option>
                    <option value="false">Inactive</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="searchBox">Search:</label>
                <input type="text" id="searchBox" placeholder="Username or email..." oninput="applyFilters()">
            </div>
        </div>

        <!-- Users Table -->
        <div class="users-table">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Branch</th>
                        <th>Base Currency</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Data will be loaded dynamically -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="editUserModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('editUserModal')">&times;</span>
            <h2 style="margin-bottom: 30px; color: #333;">
                <i class="fas fa-user-edit" style="color: #667eea;"></i>
                Edit User &amp; Assign Branch
            </h2>
            <form id="editUserForm">
                <input type="hidden" id="editUserId">

                <div class="form-group">
                    <label for="editUsername">Username</label>
                    <input type="text" id="editUsername" required readonly style="background: #f5f5f5;">
                </div>

                <div class="form-group">
                    <label for="editEmail">Email</label>
                    <input type="email" id="editEmail">
                </div>

                <div class="form-group">
                    <label for="editPhone">Phone Number</label>
                    <input type="text" id="editPhone">
                </div>

                <div class="form-group">
                    <label for="editRole">Role *</label>
                    <select id="editRole" required>
                        <option value="STAFF">Staff</option>
                        <option value="SUPERVISOR">Supervisor</option>
                        <option value="ADMIN">Admin</option>
                        <option value="SUPER_ADMIN">Super Admin</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="editBranch">Assign to Branch</label>
                    <select id="editBranch">
                        <option value="">-- No Branch --</option>
                    </select>
                    <small style="color: #666;">Users inherit branch currency by default</small>
                </div>

                <div class="form-group">
                    <label for="editBaseCurrency">Base Currency *</label>
                    <select id="editBaseCurrency" required>
                        <option value="USD">USD - US Dollar</option>
                        <option value="ZAR">ZAR - South African Rand</option>
                        <option value="RUB">RUB - Russian Ruble</option>
                        <option value="EUR">EUR - Euro</option>
                        <option value="GBP">GBP - British Pound</option>
                        <option value="ZWL">ZWL - Zimbabwean Dollar</option>
                        <option value="NGN">NGN - Nigerian Naira</option>
                        <option value="KES">KES - Kenyan Shilling</option>
                    </select>
                    <small style="color: #666;">Override branch default currency if needed</small>
                </div>

                <div class="form-group">
                    <label for="editPassword">New Password (leave blank to keep current)</label>
                    <input type="password" id="editPassword" placeholder="Enter new password or leave blank">
                </div>

                <div style="display: flex; gap: 10px; margin-top: 30px;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                    <button type="button" class="btn btn-warning" onclick="closeModal('editUserModal')"
                        style="flex: 1;">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast"></div>

    <script>
        let allUsers = [];
        let allBranches = [];

        document.addEventListener('DOMContentLoaded', loadData);

        async function loadData() {
            await Promise.all([loadUsers(), loadBranches()]);
            updateStats();
            populateBranchFilter();
        }

        async function loadUsers() {
            try {
                const response = await fetch('/users/api/all');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                allUsers = await response.json();
                renderUsers(allUsers);
            } catch (error) {
                console.error('Error loading users:', error);
                showToast('Failed to load users: ' + error.message, 'error');
            }
        }

        async function loadBranches() {
            try {
                // Correct JSON API endpoint — NOT the HTML page at /admin/branches
                const response = await fetch('/admin/branches/all');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                allBranches = await response.json();
                populateBranchDropdowns();
            } catch (error) {
                console.error('Error loading branches:', error);
                // Non-fatal — branch dropdown will be empty but page still works
            }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';

            if (!users || users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#888;padding:40px;"><i class="fas fa-users" style="font-size:24px;display:block;margin-bottom:8px;"></i>No users found</td></tr>';
                return;
            }

            users.forEach(user => {
                const roleBadgeClass = 'badge-' + user.role.toLowerCase().replace(/_/g, '-');
                const tr = document.createElement('tr');
                tr.setAttribute('data-user-id', user.id);
                tr.innerHTML = `
                    <td>${user.id}</td>
                    <td><strong>${escapeHtml(user.username)}</strong></td>
                    <td>${escapeHtml(user.email || 'N/A')}</td>
                    <td><span class="badge ${roleBadgeClass}">${user.role.replace('_', ' ')}</span></td>
                    <td>
                        ${user.branch
                        ? `<span class="branch-badge">${escapeHtml(user.branch.name)}</span>`
                        : '<span style="color:#dc3545;font-size:13px;">Not Assigned</span>'}
                    </td>
                    <td><span class="currency-badge">${escapeHtml(user.baseCurrency || 'USD')}</span></td>
                    <td>
                        <span class="badge ${user.active ? 'badge-active' : 'badge-inactive'}">
                            ${user.active ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td class="actions">
                        <button class="btn btn-warning" style="font-size:12px;padding:6px 10px;" onclick="editUser(${user.id})">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <a href="/users/${user.id}/details" class="btn btn-info" style="font-size:12px;padding:6px 10px;">
                            <i class="fas fa-eye"></i> View
                        </a>
                        ${user.active
                        ? `<button class="btn btn-danger" style="font-size:12px;padding:6px 10px;" onclick="deactivateUser(${user.id}, '${escapeHtml(user.username)}')">
                                   <i class="fas fa-ban"></i> Deactivate
                               </button>`
                        : `<button class="btn btn-success" style="font-size:12px;padding:6px 10px;" onclick="restoreUser(${user.id}, '${escapeHtml(user.username)}')">
                                   <i class="fas fa-check"></i> Restore
                               </button>`}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function populateBranchFilter() {
            const select = document.getElementById('branchFilter');
            while (select.options.length > 1) select.remove(1);
            allBranches.forEach(branch => {
                const opt = document.createElement('option');
                opt.value = branch.id;
                opt.textContent = `${branch.name} (${branch.currency})`;
                select.appendChild(opt);
            });
        }

        function populateBranchDropdowns() {
            const editBranchSelect = document.getElementById('editBranch');
            while (editBranchSelect.options.length > 1) editBranchSelect.remove(1);
            allBranches.forEach(branch => {
                const opt = document.createElement('option');
                opt.value = branch.id;
                opt.textContent = `${branch.name} (${branch.country} - ${branch.currency})`;
                opt.dataset.currency = branch.currency;
                editBranchSelect.appendChild(opt);
            });
            editBranchSelect.addEventListener('change', function () {
                const selected = this.options[this.selectedIndex];
                if (selected.dataset.currency) {
                    document.getElementById('editBaseCurrency').value = selected.dataset.currency;
                }
            });
        }

        function applyFilters() {
            const branchId = document.getElementById('branchFilter').value;
            const role = document.getElementById('roleFilter').value;
            const status = document.getElementById('statusFilter').value;
            const search = document.getElementById('searchBox').value.toLowerCase();

            const filtered = allUsers.filter(user => {
                const matchBranch = !branchId || (user.branch && String(user.branch.id) === branchId);
                const matchRole = !role || user.role === role;
                const matchStatus = !status || String(user.active) === status;
                const matchSearch = !search || user.username.toLowerCase().includes(search) || (user.email && user.email.toLowerCase().includes(search));
                return matchBranch && matchRole && matchStatus && matchSearch;
            });
            renderUsers(filtered);
        }

        async function editUser(id) {
            const user = allUsers.find(u => u.id === id);
            if (!user) return;

            document.getElementById('editUserId').value = user.id;
            document.getElementById('editUsername').value = user.username;
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('editPhone').value = user.phoneNumber || '';
            document.getElementById('editRole').value = user.role;
            document.getElementById('editBaseCurrency').value = user.baseCurrency || 'USD';
            document.getElementById('editPassword').value = '';

            // Reload branches to ensure dropdown is populated, then set value
            await loadBranches();
            document.getElementById('editBranch').value = user.branch ? user.branch.id : '';

            document.getElementById('editUserModal').style.display = 'block';
        }

        /** Deactivate (soft-delete) a user — calls POST /users/delete */
        async function deactivateUser(id, username) {
            if (!confirm(`Deactivate "${username}"?\nTheir account will be disabled but all records will be preserved.`)) return;
            const formData = new FormData();
            formData.append('id', id);
            const csrfToken = document.querySelector('meta[name="_csrf"]').content;
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

            try {
                const response = await fetch('/users/delete', {
                    method: 'POST',
                    body: formData,
                    headers: { [csrfHeader]: csrfToken }
                });
                // The endpoint redirects on success; fetch follows the redirect transparently
                if (response.ok || response.redirected) {
                    showToast(`User "${username}" deactivated successfully.`, 'success');
                    await loadUsers();
                    updateStats();
                } else {
                    throw new Error('Server returned ' + response.status);
                }
            } catch (error) {
                console.error('Error deactivating user:', error);
                showToast('Failed to deactivate: ' + error.message, 'error');
            }
        }

        /** Restore (re-activate) a user — calls POST /users/restore */
        async function restoreUser(id, username) {
            if (!confirm(`Restore "${username}"?\nTheir account will be re-activated.`)) return;
            const formData = new FormData();
            formData.append('id', id);
            const csrfToken = document.querySelector('meta[name="_csrf"]').content;
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

            try {
                const response = await fetch('/users/restore', {
                    method: 'POST',
                    body: formData,
                    headers: { [csrfHeader]: csrfToken }
                });
                if (response.ok || response.redirected) {
                    showToast(`User "${username}" restored successfully.`, 'success');
                    await loadUsers();
                    updateStats();
                } else {
                    throw new Error('Server returned ' + response.status);
                }
            } catch (error) {
                console.error('Error restoring user:', error);
                showToast('Failed to restore: ' + error.message, 'error');
            }
        }

        // Save user (edit + assign branch) — PUT /admin/users/{id}
        document.getElementById('editUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = document.getElementById('editUserId').value;
            const branchValue = document.getElementById('editBranch').value;
            const userData = {
                email: document.getElementById('editEmail').value,
                phoneNumber: document.getElementById('editPhone').value,
                role: document.getElementById('editRole').value,
                baseCurrency: document.getElementById('editBaseCurrency').value,
                branch: branchValue ? { id: parseInt(branchValue) } : null
            };
            const password = document.getElementById('editPassword').value;
            if (password) userData.password = password;

            const csrfToken = document.querySelector('meta[name="_csrf"]').content;
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

            try {
                const response = await fetch(`/admin/users/${userId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        [csrfHeader]: csrfToken
                    },
                    body: JSON.stringify(userData)
                });
                if (response.ok) {
                    closeModal('editUserModal');
                    showToast('User updated and branch assigned successfully!', 'success');
                    await loadData();
                } else {
                    const err = await response.text();
                    throw new Error(err || 'Unknown error');
                }
            } catch (error) {
                console.error('Error updating user:', error);
                showToast('Failed to update: ' + error.message, 'error');
            }
        });

        function updateStats() {
            document.getElementById('totalUsers').textContent = allUsers.length;
            document.getElementById('totalBranches').textContent = allBranches.length;
            document.getElementById('activeUsers').textContent = allUsers.filter(u => u.active).length;
            document.getElementById('staffCount').textContent = allUsers.filter(u => u.role === 'STAFF').length;
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openAddUserModal() { window.location.href = '/users/new'; }

        function escapeHtml(text) {
            if (text == null) return '';
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => { toast.className = `toast ${type}`; }, 4500);
        }

        window.onclick = function (event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        };
    </script>
</body>

</html>
