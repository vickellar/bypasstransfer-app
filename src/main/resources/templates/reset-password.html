<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <title>Reset Password</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/png" th:href="@{/favicon.png}" />
        <link rel="stylesheet" th:href="@{/css/site.css}" />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>
    <body>
        <img th:src="@{/images/app-logo.png}" alt="ByPass Transfers Logo" style="width:80px;height:80px;object-fit:contain;border-radius:10px;display:block;margin:0 auto 12px;" />
        <h1>Reset Password</h1>
        <!-- DEBUG: show token so you can confirm it's present when the page loads -->
        <div style="background:#fffb; padding:8px; border:1px solid #ccc; margin-bottom:12px;" th:if="${token}">
            <strong>DEBUG: token present:</strong>
            <span id="debug-token" th:text="${token}"></span>
        </div>
        <script>
            // Log token presence for easier debugging in browser console
            try {
                const t = document.getElementById('debug-token');
                if (t) console.log('Reset token on page:', t.textContent);
                else console.log('No reset token element present on page');
            } catch (e) { console.log('debug script error', e); }
        </script>
        <div th:if="${success}" style="color:green;" th:text="${success}"></div>
        <div th:if="${error}" style="color:red;" th:text="${error}"></div>
        <form th:action="@{/reset}" method="post">
            <!-- Required for Spring Security CSRF -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" name="token" th:value="${token}" />
            <div>
                <label>New password</label>
                <input type="password" name="password" required minlength="6" placeholder="At least 6 characters" />
            </div>
            <div>
                <button type="submit">Reset Password</button>
            </div>
        </form>
        <p><a th:href="@{/login}">Back to login</a></p>
    </body>
</html>
