<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Audit Logs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h1>Audit Logs</h1>
<p><a th:href="@{/}">Back to Dashboard</a></p>
<table class="table table-sm table-bordered">
    <thead>
    <tr>
        <th>ID</th>
        <th>Entity</th>
        <th>Entity ID</th>
        <th>Action</th>
        <th>Old</th>
        <th>New</th>
        <th>Performed By</th>
        <th>When</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="log : ${logs}">
        <td th:text="${log.id}"></td>
        <td th:text="${log.entityName}"></td>
        <td th:text="${log.entityId}"></td>
        <td th:text="${log.action}"></td>
        <td th:text="${log.oldValue}"></td>
        <td th:text="${log.newValue}"></td>
        <td th:text="${log.performedBy}"></td>
        <td th:text="${#temporals.format(log.performedAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
