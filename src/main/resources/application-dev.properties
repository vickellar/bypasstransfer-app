# =====================================================
# Development Profile Configuration
# Safe for local network access (HTTP)
# =====================================================

# ===============================
# SESSION & SECURITY (Development)
# ===============================
# Allow session cookies over HTTP (safe for local development only!)
server.servlet.session.cookie.secure=false

# Use 'lax' instead of 'strict' to allow cookies from same site
# This enables port forwarding and local network access
server.servlet.session.cookie.same-site=lax

# ===============================
# CORS (Cross-Origin Resource Sharing)
# ===============================
# Allow requests from local network IPs
# Add your computer's IP address here for phone testing
app.cors.allowed-origins=http://localhost:8080,http://127.0.0.1:8080

# ===============================
# DEBUG SETTINGS (Development Only)
# ===============================
# Enable more verbose logging for troubleshooting
logging.level.org.springframework.security=INFO
logging.level.com.bypass.bypasstransers=DEBUG

# ===============================
# DEVELOPMENT CONVENIENCE
# ===============================
# Disable template caching so you see changes immediately
spring.thymeleaf.cache=false

# Show SQL in console (helpful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
