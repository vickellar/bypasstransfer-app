# =====================================================
# PRODUCTION CONFIGURATION
# ByPass Transfers - Production Profile
# Use: java -jar -Dspring.profiles.active=prod app.jar
# =====================================================

spring.application.name=bypasstransers

# ===============================
# POSTGRESQL - Production
# ===============================
# Update these with your production database credentials
spring.datasource.url=jdbc:postgresql://localhost:5432/bypass_records
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP) - Optimized for 50-200 users
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=ByPassHikariPool

# ===============================
# JPA / HIBERNATE - Production
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Disable SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Use update for production (consider 'validate' for strict control)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=public

# Performance optimizations
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=100

# Disable initialization
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# ===============================
# FLYWAY - Production
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===============================
# THYMELEAF - Production
# ===============================
# Enable template caching for performance
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ===============================
# SERVER - Production
# ===============================
server.port=8080
# Tomcat thread pool tuning for 50-200 concurrent users
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=10
server.tomcat.accept-count=100
server.tomcat.max-connections=10000

# Enable compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

# ===============================
# SECURITY - Production
# ===============================
# Disable debug mode
spring.security.debug=false

# Session configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# LOGGING - Production
# ===============================
# Production logging levels
logging.level.root=WARN
logging.level.com.bypass.bypasstransers=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Log file configuration
logging.file.name=logs/bypasstransers.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB

# ===============================
# ACTUATOR - Production (Monitoring)
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=always
management.info.env.enabled=true

# Health indicators
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.health.diskspace.threshold=1GB

# ===============================
# APPLICATION INFO
# ===============================
info.app.name=ByPass Transfers
info.app.description=Secure Money Transfer Platform
info.app.version=1.0.0
