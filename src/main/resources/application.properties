spring.application.name=bypasstransers

# ===============================
# ACTUATOR & MONITORING
# ===============================
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always

# ===============================
# POSTGRESQL
# ===============================
# Configure these values to match your local PostgreSQL instance.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bypass_records}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:NjisweVic~2030}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP) - Optimized for development
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Use Postgres default schema
# Ensure the database initialization script creates and populates the same schema
#spring.sql.init.mode=always
#spring.jpa.defer-datasource-initialization=true
#spring.jpa.properties.hibernate.default_schema=bypass
# Disable running custom schema.sql so Hibernate manages tables (avoid mismatches)
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false
spring.jpa.properties.hibernate.default_schema=public

# Hibernate auto DDL (update will create tables if missing)
spring.jpa.hibernate.ddl-auto=update

# Make Hibernate more lenient with schema validation
spring.jpa.hibernate.globally_quoted_identifiers=false
spring.jpa.properties.hibernate.hbm2ddl.auto=update

# Enable Flyway database migrations (will run scripts in classpath:db/migration)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Mail — set MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD (e.g. in .env for Docker, or OS env for local runs)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:smtp.gmail.com}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ===============================
# SERVER
# ===============================
# Server port 8080 (changed to avoid conflict during development)
# Use the PORT environment variable provided by the host (Render, Heroku, etc.).
server.port=${PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}
# Tomcat thread pool tuning for 50-200 concurrent users
server.tomcat.max-threads=50
server.tomcat.min-spare-threads=10
server.tomcat.accept-count=100
server.tomcat.max-connections=10000


# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Fix for "Session committed" errors in authentication pages
spring.thymeleaf.servlet.produce-partial-output-while-processing=false
spring.thymeleaf.servlet.max-chunk-size=32768

# Enable Spring Security debug logging to troubleshoot login failures
spring.security.debug=false

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# LOGGING
# ===============================
logging.level.org.hibernate.SQL=false
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=false
# Enable detailed Spring Security logs for development
logging.level.org.springframework.security=false

# ===============================
# LOGGING - Production
# ===============================
# Production logging levels
logging.level.root=WARN
logging.level.com.bypass.bypasstransers=INFO
logging.level.org.springframework.web=WARN

# Enable compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024


# Session configuration
# Defaults to production-safe settings
# Override in application-dev.properties for development
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:lax}

# Log file configuration: disabled writing to container filesystem; prefer stdout/stderr on Render
# logging.file.name=logs/bypasstransers.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB


# Health indicators
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.health.diskspace.threshold=1GB

# ===============================
# APPLICATION INFO
# ===============================
info.app.name=ByPass Transfers
info.app.description=Secure Money Transfer Platform
info.app.version=1.0.0
