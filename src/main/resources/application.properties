spring.application.name=bypasstransers

# ===============================
# POSTGRESQL
# ===============================
# Configure these values to match your local PostgreSQL instance.
spring.datasource.url=jdbc:postgresql://localhost:5432/bypass_records
spring.datasource.username=postgres
spring.datasource.password=*******
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Use Postgres default schema
# Ensure the database initialization script creates and populates the same schema
#spring.sql.init.mode=always
#spring.jpa.defer-datasource-initialization=true
#spring.jpa.properties.hibernate.default_schema=bypass
# Disable running custom schema.sql so Hibernate manages tables (avoid mismatches)
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false
spring.jpa.properties.hibernate.default_schema=public

# Hibernate auto DDL (update will create tables if missing)
spring.jpa.hibernate.ddl-auto=update

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# LOGGING
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
