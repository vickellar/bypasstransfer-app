spring.application.name=bypasstransers



# ===============================
# POSTGRESQL
# ===============================
# Configure these values to match your local PostgreSQL instance.
spring.datasource.url=jdbc:postgresql://localhost:5432/bypass_records
spring.datasource.username=postgres
spring.datasource.password=NjisweVic~2030
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP) - Optimized for development
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Use Postgres default schema
# Ensure the database initialization script creates and populates the same schema
#spring.sql.init.mode=always
#spring.jpa.defer-datasource-initialization=true
#spring.jpa.properties.hibernate.default_schema=bypass
# Disable running custom schema.sql so Hibernate manages tables (avoid mismatches)
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false
spring.jpa.properties.hibernate.default_schema=public

# Hibernate auto DDL (update will create tables if missing)
spring.jpa.hibernate.ddl-auto=update

# Make Hibernate more lenient with schema validation
spring.jpa.hibernate.globally_quoted_identifiers=false
spring.jpa.properties.hibernate.hbm2ddl.auto=update

# Enable Flyway database migrations (will run scripts in classpath:db/migration)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Mail configuration (example). Configure these values to use a real SMTP server.
#spring.mail.host=smtp.example.com
#spring.mail.port=587
#spring.mail.username=your-username
#spring.mail.password=your-password
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# SERVER
# ===============================
# Server port 8083 (changed to avoid conflict during development)
server.port=8083

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Enable Spring Security debug logging to troubleshoot login failures
spring.security.debug=true

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# LOGGING
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# Enable detailed Spring Security logs
logging.level.org.springframework.security=DEBUG