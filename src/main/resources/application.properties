spring.application.name=bypasstransers

# ===============================
# ACTUATOR & MONITORING
# ===============================
management.endpoints.web.exposure.include=${MANAGEMENT_EXPOSURE:health,info,metrics,prometheus}
management.endpoint.health.show-details=${HEALTH_SHOW_DETAILS:when-authorized}
management.endpoint.health.show-components=always
management.info.env.enabled=true

# ===============================
# POSTGRESQL
# ===============================
# Production-ready configuration with fallback for local development
spring.datasource.url=${JDBC_DATABASE_URL:${DB_URL:jdbc:postgresql://localhost:5432/bypass_records}}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP) - Optimized for Production (50-200 users)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:20}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=ByPassHikariPool

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.hibernate.globally_quoted_identifiers=false
spring.jpa.properties.hibernate.hbm2ddl.auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.default_schema=public

# Performance optimizations
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=100

spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===============================
# MAIL
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:smtp.gmail.com}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===============================
# SERVER
# ===============================
server.port=${PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}
# Tomcat thread pool tuning for 50-200 concurrent users
server.tomcat.max-threads=${TOMCAT_MAX_THREADS:50}
server.tomcat.min-spare-threads=${TOMCAT_MIN_SPARE:10}
server.tomcat.accept-count=100
server.tomcat.max-connections=10000

# Enable compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

# Session configuration - Defaulting to production-safe settings
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:strict}

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.cache=${THYMELEAF_CACHE:true}
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Fix for "Session committed" errors in authentication pages (User to handle further)
spring.thymeleaf.servlet.produce-partial-output-while-processing=false
spring.thymeleaf.servlet.max-chunk-size=32768

# ===============================
# SECURITY
# ===============================
spring.security.debug=${SECURITY_DEBUG:false}

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# LOGGING
# ===============================
logging.level.root=${LOG_LEVEL_ROOT:WARN}
logging.level.com.bypass.bypasstransers=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:WARN}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}

# Log file configuration
logging.file.name=${LOG_FILE:logs/bypasstransers.log}
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB

# ===============================
# EXCHANGE RATE API
# ===============================
exchange.rate.api.key=${EXCHANGE_RATE_API_KEY:}
exchange.rate.api.url=${EXCHANGE_RATE_API_URL:https://api.exchangerate-api.com/v4/latest/}
exchange.rate.update.cron=${EXCHANGE_RATE_CRON:0 0 9 * * *}
spring.task.scheduling.enabled=true

# ===============================
# HEALTH INDICATORS
# ===============================
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.health.diskspace.threshold=1GB

# ===============================
# APPLICATION INFO
# ===============================
info.app.name=ByPass Transfers
info.app.description=Secure Money Transfer Platform
info.app.version=1.0.0
